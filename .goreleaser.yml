version: 2

project_name: shell-guard

before:
  hooks:
    - go mod download

builds:
  - id: shg
    main: ./cmd/shg
    binary: shg
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: shellguardd
    main: ./cmd/shellguardd
    binary: shellguardd
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: true

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

release:
  prerelease: auto